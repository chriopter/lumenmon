name: Update Vendored Dependencies

on:
  # Run weekly on Mondays at 09:00 UTC
  schedule:
    - cron: '0 9 * * 1'

  # Allow manual triggering
  workflow_dispatch:

jobs:
  update-deps:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Update vendored dependencies
      run: |
        chmod +x ./dev/updatedeps
        ./dev/updatedeps

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: chore: update Rails dependencies
        branch: auto/update-deps
        delete-branch: true
        title: 'chore: update Rails dependencies'
        body: |
          ## Automated Dependency Update

          This PR refreshes the Rails bundle lockfile.

          Run `./dev/updatedeps` locally to reproduce.

          ### Testing

          - [ ] Verify the Rails console container builds
          - [ ] Verify the dashboard loads

          ---

          *This PR was automatically generated by the [update-deps workflow](https://github.com/${{ github.repository }}/actions/workflows/update-deps.yml)*
        labels: |
          dependencies
          automated
        assignees: ${{ github.repository_owner }}
