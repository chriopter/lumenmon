# MQTT configuration with TLS and authenticated agent publishing.

per_listener_settings true

listener 1883 127.0.0.1
allow_anonymous true
persistence false

listener 8884
protocol mqtt
cafile /data/mqtt/server.crt
certfile /data/mqtt/server.crt
keyfile /data/mqtt/server.key
tls_version tlsv1.2
require_certificate false
allow_anonymous false
password_file /data/mqtt/passwd
acl_file /app/config/mqtt_acl

max_connections 1000
max_inflight_messages 100
max_queued_messages 1000
max_packet_size 65536

log_dest stdout
log_type error
log_type warning
log_timestamp true
log_timestamp_format %Y-%m-%d %H:%M:%S
